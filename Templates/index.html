
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Portfolio Optimizer</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07091a;--bg2:#0b0d20;--sf:#0f1428;--sf2:#141a35;
    --bd:#1a2340;--bd2:#243060;
    --tx:#d8e2f8;--mu:#4e6290;--mu2:#7a96c8;
    --a:#4b82f5;--ah:#3b70e0;--a2:#9b6bf5;--a2h:#8b5ae0;
    --ok:#10d08a;--er:#f04055;
    --sb:#06081a;--sbh:#0b0e28;
  }
  body.cmp{--bg:#080614;--sf:#11082a;--sf2:#170d36;--bd:#221550}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--tx);display:flex;flex-direction:column;transition:background .45s}

  /* ─── HEADER ─────────────────────────────────────────── */
  header{height:60px;background:var(--sb);border-bottom:1px solid var(--bd);
    display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
  .logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;color:var(--tx);letter-spacing:-.4px}
  .logo-orb{width:32px;height:32px;border-radius:10px;
    background:linear-gradient(135deg,var(--a),var(--a2));
    display:flex;align-items:center;justify-content:center;font-size:17px}
  .cmpbtn{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:9px;
    border:1px solid var(--bd2);background:transparent;color:var(--mu2);
    font-size:13px;font-weight:600;cursor:pointer;transition:all .25s}
  .cmpbtn:hover{border-color:var(--a);color:var(--a);background:rgba(75,130,245,.07)}
  body.cmp .cmpbtn{border-color:var(--a2);color:var(--a2);background:rgba(155,107,245,.1)}
  .cmpbtn-pip{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:background .25s}
  body.cmp .cmpbtn-pip{background:var(--a2);box-shadow:0 0 8px var(--a2)}

  /* ─── LAYOUT ─────────────────────────────────────────── */
  .main{flex:1;display:grid;grid-template-columns:230px 1fr 290px;overflow:hidden;min-height:0}

  /* ─── SIDEBAR ────────────────────────────────────────── */
  .sidebar{background:var(--sb);border-right:1px solid var(--bd);overflow-y:auto;
    padding:20px 0;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
  .s-group-label{color:var(--mu);font-size:10px;font-weight:700;letter-spacing:1.8px;
    text-transform:uppercase;padding:0 18px 10px}
  .si{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;
    border-left:3px solid transparent;color:var(--mu2);font-size:13.5px;
    transition:all .18s;border-bottom:1px solid rgba(255,255,255,.025)}
  .si:hover{background:var(--sbh);color:var(--tx)}
  .si.act{background:var(--sbh);color:var(--tx);border-left-color:var(--a);font-weight:700}
  body.cmp .si.act{border-left-color:var(--a2)}
  .si-ico{font-size:20px;width:26px;flex-shrink:0;text-align:center;filter:saturate(.9)}
  .si-lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .si-cnt{font-size:11px;background:var(--bd);color:var(--mu);
    padding:2px 8px;border-radius:20px;flex-shrink:0}

  /* ─── STOCKS CENTER ──────────────────────────────────── */
  .center{overflow-y:auto;padding:26px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
  .shead{margin-bottom:22px}
  .shead h2{font-size:23px;font-weight:800;letter-spacing:-.5px;margin-bottom:5px}
  .shead p{font-size:13px;color:var(--mu)}
  .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:14px}
  .scard{background:var(--sf);border:1.5px solid var(--bd);border-radius:13px;
    padding:22px;cursor:pointer;
    transition:transform .22s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s,background .18s;
    animation:fadeUp .3s ease both}
  .scard:hover{border-color:var(--a);transform:translateY(-4px) scale(1.025);
    box-shadow:0 10px 30px rgba(75,130,245,.2);background:var(--sf2)}
  .scard.sel1{border-color:rgba(75,130,245,.7);background:rgba(75,130,245,.1)}
  .scard.sel2{border-color:rgba(155,107,245,.7);background:rgba(155,107,245,.1)}
  .scard.both{border-color:rgba(16,208,138,.7);background:rgba(16,208,138,.08)}
  .c-tkr{font-size:16px;font-weight:800;color:var(--a);letter-spacing:-.3px;margin-bottom:3px}
  .scard.sel2 .c-tkr{color:var(--a2)}
  .c-name{font-size:12px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:10px}
  .c-price{font-size:14px;font-weight:700;color:var(--tx)}
  .c-badges{display:flex;gap:4px;margin-top:8px}
  .badge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.3px}
  .b1{background:rgba(75,130,245,.2);color:#7aadff;border:1px solid rgba(75,130,245,.3)}
  .b2{background:rgba(155,107,245,.2);color:#c0a0ff;border:1px solid rgba(155,107,245,.3)}

  /* ─── RIGHT PANEL ────────────────────────────────────── */
  .rp{background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
  .ptabs{display:none;border-bottom:1px solid var(--bd);flex-shrink:0}
  body.cmp .ptabs{display:flex}
  .ptab{flex:1;padding:15px 0;text-align:center;font-size:13px;font-weight:700;
    cursor:pointer;color:var(--mu);border-bottom:2.5px solid transparent;
    margin-bottom:-1px;transition:all .18s;letter-spacing:.2px}
  .ptab.act{color:var(--a);border-bottom-color:var(--a)}
  #tab2.act{color:var(--a2);border-bottom-color:var(--a2)}
  .ppanel{flex:1;overflow-y:auto;padding:18px;display:none;
    scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
  .ppanel.show{display:block}
  .p-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .p-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--mu)}
  .p-count{font-size:12px;color:var(--mu);background:var(--bd);padding:2px 9px;border-radius:20px}
  .empty-s{text-align:center;margin-top:64px;color:var(--mu)}
  .e-ico{font-size:36px;margin-bottom:10px;opacity:.35}
  .e-txt{font-size:13px}

  .selitem{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:11px 13px;background:var(--sf2);border:1px solid var(--bd);
    border-radius:10px;margin-bottom:7px;
    animation:pop .2s ease both;transition:border-color .18s,transform .18s}
  .selitem:hover{border-color:var(--bd2);transform:translateX(2px)}
  .si-tick{font-size:13.5px;font-weight:800;color:var(--a);margin-bottom:2px}
  .si-name{font-size:11px;color:var(--mu)}
  .rm{background:none;border:1px solid transparent;width:28px;height:28px;border-radius:50%;
    color:var(--mu);cursor:pointer;font-size:18px;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;transition:all .2s;line-height:1}
  .rm:hover{background:rgba(240,64,85,.15);border-color:var(--er);color:var(--er);transform:scale(1.2) rotate(90deg)}

  /* ─── FOOTER ─────────────────────────────────────────── */
  footer{height:70px;background:var(--sb);border-top:1px solid var(--bd);
    display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex-shrink:0}
  .f-info{display:flex;flex-direction:column;gap:3px}
  .f-err{font-size:13px;color:var(--er);font-weight:500}
  .f-sum{font-size:13px;color:var(--mu)}
  .f-sum strong{color:var(--tx);font-weight:700}
  .optbtn{display:flex;align-items:center;gap:9px;padding:13px 30px;
    background:var(--a);color:#fff;border:none;border-radius:11px;
    font-size:15px;font-weight:800;cursor:pointer;letter-spacing:-.2px;
    transition:all .22s;box-shadow:0 4px 20px rgba(75,130,245,.35)}
  .optbtn:hover{background:var(--ah);transform:translateY(-2px);box-shadow:0 8px 28px rgba(75,130,245,.45)}
  .optbtn:active{transform:translateY(0);box-shadow:0 2px 10px rgba(75,130,245,.3)}
  .optbtn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  body.cmp .optbtn{background:linear-gradient(130deg,var(--a) 20%,var(--a2));
    box-shadow:0 4px 20px rgba(155,107,245,.35)}
  body.cmp .optbtn:hover{box-shadow:0 8px 28px rgba(155,107,245,.5)}
</style>

</head>
<body>
<header>
  <div class="logo">
    <div class="logo-orb">📈</div>
    Portfolio Optimizer
  </div>
  <button class="cmpbtn" onclick="toggleCmp()">
    <div class="cmpbtn-pip"></div>
    <span id="cmpLabel">Compare Mode</span>
  </button>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="s-group-label">Sectors</div>
    <div id="secList"></div>
  </aside>

  <section class="center">
    <div class="shead">
      <h2 id="secTitle">Select a Sector</h2>
      <p id="secSub">Choose a sector from the sidebar to browse stocks</p>
    </div>
    <div id="sgrid" class="sgrid"></div>
  </section>

  <aside class="rp">
    <div class="ptabs">
      <div class="ptab act" id="tab1" onclick="switchTab(1)">Portfolio 1</div>
      <div class="ptab" id="tab2" onclick="switchTab(2)">AI Portfolio</div>
    </div>
    <div class="ppanel show" id="panel1">
      <div class="p-header">
        <div class="p-label">Portfolio 1</div>
        <div class="p-count" id="cnt1">0 stocks</div>
      </div>
      <div id="emp1" class="empty-s"><div class="e-ico">📋</div><div class="e-txt">No stocks selected</div></div>
      <div id="list1"></div>
    </div>
    <div class="ppanel" id="panel2">
      <div class="p-header">
        <div class="p-label">AI Portfolio</div>
        <div class="p-count" id="cnt2">0 stocks</div>
      </div>
      <div id="emp2" class="empty-s"><div class="e-ico">📋</div><div class="e-txt">No stocks selected</div></div>
      <div id="list2"></div>
    </div>
  </aside>
</div>

<footer>
  <div class="f-info">
    <div class="f-err" id="fErr"></div>
    <div class="f-sum" id="fSum">No stocks selected</div>
  </div>
  <button class="optbtn" id="optBtn" onclick="goOpt()">Optimize →</button>
</footer>

<script>
const ICONS={
  'Technology':'💻','Information Technology':'💻',
  'Healthcare':'🏥','Health Care':'🏥',
  'Financials':'💰','Finance':'💰','Financial Services':'💰',
  'Energy':'🔋','Utilities':'🔌',
  'Consumer Discretionary':'🛒','Consumer Staples':'🛍️',
  'Materials':'⚗️','Industrials':'⚙️',
  'Real Estate':'🏢','Communication Services':'📡',
  'default':'📊'
};

let cos={}, sel={1:new Map(),2:new Map()}, aPort=1, cmp=false, actSec=null;

async function init(){
  const r=await fetch("/companies"); cos=await r.json();
  const el=document.getElementById("secList");
  Object.keys(cos).sort().forEach(sec=>{
    const d=document.createElement("div");
    d.className="si"; d.dataset.s=sec;
    const ico=ICONS[sec]||ICONS.default;
    d.innerHTML=`<span class="si-ico">${ico}</span>
      <span class="si-lbl">${sec}</span>
      <span class="si-cnt">${cos[sec].length}</span>`;
    d.onclick=()=>showSec(sec);
    el.appendChild(d);
  });
  updSum();
}

function showSec(sec){
  actSec=sec;
  document.querySelectorAll(".si").forEach(e=>e.classList.toggle("act",e.dataset.s===sec));
  document.getElementById("secTitle").textContent=sec;
  document.getElementById("secSub").textContent=
    `${cos[sec].length} stocks · click to add to ${cmp?"the active portfolio":"your portfolio"}`;
  renderGrid();
}

function renderGrid(){
  if(!actSec) return;
  const g=document.getElementById("sgrid"); g.innerHTML="";
  cos[actSec].forEach((s,i)=>{
    const in1=sel[1].has(s.ticker), in2=sel[2].has(s.ticker);
    let cl="scard";
    if(in1&&in2) cl+=" both"; else if(in1) cl+=" sel1"; else if(in2) cl+=" sel2";
    const badges=cmp
      ?((in1?'<span class="badge b1">P1</span>':'')+(in2?'<span class="badge b2">P2</span>':'')):'';
    const d=document.createElement("div");
    d.className=cl; d.style.animationDelay=`${i*0.028}s`;
    d.innerHTML=`<div class="c-tkr">${s.ticker}</div>
      <div class="c-name">${s.company}</div>
      <div class="c-price">$${s.price.toFixed(2)}</div>
      ${badges?`<div class="c-badges">${badges}</div>`:''}`;
    d.onclick=()=>toggleStk(s);
    g.appendChild(d);
  });
}

function toggleStk(s){
  const p=aPort;
  sel[p].has(s.ticker)?sel[p].delete(s.ticker):sel[p].set(s.ticker,s);
  renderSel(); renderGrid(); updSum();
}

function renderSel(){
  [1,2].forEach(p=>{
    const list=document.getElementById("list"+p), emp=document.getElementById("emp"+p);
    const cnt=document.getElementById("cnt"+p);
    list.innerHTML="";
    cnt.textContent=`${sel[p].size} stock${sel[p].size!==1?"s":""}`;
    if(!sel[p].size){emp.style.display="block";return;}
    emp.style.display="none";
    let i=0;
    sel[p].forEach((s,t)=>{
      const d=document.createElement("div"); d.className="selitem";
      d.style.animationDelay=`${i*0.035}s`;
      d.innerHTML=`<div><div class="si-tick">${t}</div><div class="si-name">${s.company}</div></div>
        <button class="rm" onclick="rmStk(${p},'${t}')">×</button>`;
      list.appendChild(d); i++;
    });
  });
}

function rmStk(p,t){ sel[p].delete(t); renderSel(); renderGrid(); updSum(); }

function updSum(){
  document.getElementById("fSum").innerHTML=cmp
    ?`P1 <strong>${sel[1].size}</strong> &nbsp;·&nbsp; P2 <strong>${sel[2].size}</strong> stocks`
    :`<strong>${sel[1].size}</strong> stock${sel[1].size!==1?"s":""} selected`;
}

function switchTab(n){
  aPort=n;
  [1,2].forEach(i=>{
    document.getElementById("tab"+i).classList.toggle("act",i===n);
    document.getElementById("panel"+i).classList.toggle("show",i===n);
  });
  renderGrid();
}

function toggleCmp(){
  cmp=!cmp;
  document.body.classList.toggle("cmp",cmp);
  if(!cmp){
    aPort=1;
    document.getElementById("panel1").classList.add("show");
    document.getElementById("panel2").classList.remove("show");
    document.getElementById("tab1").classList.add("act");
    document.getElementById("tab2").classList.remove("act");
  }
  document.getElementById("cmpLabel").textContent=cmp?"Compare ON":"Compare Mode";
  if(actSec) document.getElementById("secSub").textContent=
    `${cos[actSec].length} stocks · click to add to ${cmp?"the active portfolio":"your portfolio"}`;
  renderGrid(); updSum();
}

async function goOpt(){
  const err=document.getElementById("fErr"); err.textContent="";
  const t1=[...sel[1].keys()], t2=[...sel[2].keys()];
  if(t1.length<2){err.textContent=cmp?"Portfolio 1 needs ≥ 2 stocks":"Select at least 2 stocks.";return;}
  if(cmp&&t2.length<2){err.textContent="AI Portfolio needs at least 2 stocks.";return;}
  const btn=document.getElementById("optBtn");
  btn.disabled=true; btn.textContent="Optimizing…";
  const body={tickers:t1}; if(cmp) body.tickers2=t2;
  const res=await fetch("/optimize",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.json();
  btn.disabled=false; btn.innerHTML="Optimize →";
  if(!res.ok){err.textContent=data.error;return;}
  sessionStorage.setItem("optRes",JSON.stringify(data));
  window.location.href="/results";
}

init();
</script>
</body>
</html>
